    document.getElementById("input").value = "";
    document.getElementById("input").focus();
  }
</script>
<html>

<body>

<input type='number' id='input' onkeyup='filter(this.value)'></input>
<button onclick="empty()" >Click me</button><br/>

<span id='output'></span>
</body>
</html>
