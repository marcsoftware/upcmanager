    function main(){
      var input = document.getElementById('input').value;
      document.getElementById('output').innerHTML='';
      parse(input);

    //--------------------------------------------
    //
    //--------------------------------------------
    function parse(text){
        var lines = text.split("\n");
        lines = lines.filter(n => n);// delete empty lines
        var modname='none';
        var linecounter=0;
        //document.getElementById('output').innerHTML = lines;
        for(var i =0;i<lines.length;i++){
          line=lines[i];
          if(line.includes("_")){
            modname=line.trim();
            //TODO add emoji to modname
            modname = addEmoji(modname);

            linecounter=1;
            //document.getElementById('output').innerHTML += line+"<br/>";
          }else{
            //line contains numbers
            var numbers=line.replace(/\[[^\[\]]+\]/g,''); //delete everything between brackets[]
             numbers = numbers.replace(/\D/g,""); //delete all non digits
            
       
            
            numbers = numbers.match(/\d\d\d\d/g); // capture all 4digits numbers
            
           // document.getElementById('output').innerHTML += numbers+"<br/>";
            
            // display the numbers using modname TAB linecounter TAB upc
            for(var j =0;j<numbers.length;j++){
              // print the upcs
              //document.getElementById('output').innerHTML += modname+linecounter+numbers[j]+"<br/>";
              document.getElementById('output').innerHTML += `${modname} ${linecounter}вһ– ${numbers[j]}'<br/>`;
              linecounter++;

            }

          }

        }
        window.scrollTo(0, document.body.scrollHeight); //
    }

     //--------------------------------------------

    function debug(){
     
            // maybe turn theminto emojies
            //1пёҸвғЈ2пёҸвғЈ3пёҸвғЈ4пёҸвғЈ5пёҸвғЈ6пёҸвғЈ7пёҸвғЈ8пёҸвғЈ9пёҸвғЈ9пёҸвғЈрқҹҺрқҹҸрқҹҗрқҹ‘рқҹ’рқҹ“рқҹ”рқҹ•рқҹ–рқҹ—

      // TODO format text in the input-textarea to have 5 upc on each line
      // add [number] in brackets for easy debuggin.
      var keepcounter=0;
      var output="";
      var original = document.getElementById('input').value;
        all = original.trim().split("\n");
         for(var i =0;i<all.length;i++){
          var line = all[i];
           if(line.includes("_")){
            output+=line+"\n";
            keepcounter=0;
           }else{ //if line contains numbers
                  var numbers=line.replace(/\[[^\[\]]+\]/g,''); //delete everything between brackets[]
             numbers = numbers.replace(/\D/g,""); //delete all non digits
            
       
            
            numbers = numbers.match(/\d\d\d\d/g); // capture all 4digits numbers
            
           // document.getElementById('output').innerHTML += numbers+"<br/>";
            
            // display the numbers using modname TAB linecounter TAB upc
            for(var j =0;j<numbers.length;j++){
              
             output+=numbers[j]+`[${j+keepcounter+1}]`;
             if((j+1)%10===0){
              output+='\n';
             }

            }
              keepcounter+=j;
           }
        }

         document.getElementById('input').value=output;
         document.getElementById("input").focus();
    }

    //рҹҢҳ рҹҢҷ рҹҢҺ рҹӘҗ рҹ’« вңЁ вҡЎпёҸ вҳ„пёҸ рҹ’Ҙ рҹ”Ҙ рҹҢӘ вҳҖпёҸ рҹҢӨ рҹҢҰ  вӣҲ  рҹҢЁ вқ„пёҸ вҳғпёҸ рҹ”ҙ рҹҹ  рҹҹЎ рҹҹў рҹ”ө рҹҹЈ вҡ«пёҸ вҡӘпёҸ рҹҹӨ рҹ”ә рҹ”» рҹ”ё рҹ”№ рҹ”¶ рҹ”· рҹ”і рҹ”І в—ҫпёҸ в—ҪпёҸ рҹҹҘ рҹҹ§ рҹҹЁ рҹҹ© рҹҹҰ рҹҹӘ в¬ӣпёҸ в¬ңпёҸ

    function addEmoji(name){
      var alldigits = name.match(/[a-zA-Z]\d+/g)[0];
      alldigits = alldigits.match(/\d+/g)[0];

      var lastdigit = parseInt(alldigits[alldigits.length-1]);
   
        var emoji = emojis[lastdigit];

      return name+emoji;
    }
